<app-navbar></app-navbar>
<div>
  <div *ngIf="!loggedIn" class="container">
    <span class="row mx-auto d-block">
      <img
        src="../assets/img/appoll-text-logo.png"
        style="width: 30rem; height: 30rem; margin-bottom: 7rem"
      />
      <img
        src="../assets/img/appollo-logo.png"
        style="width: 30rem; height: 30rem"
      />
      <div
        class="row form-inline"
        style="display: absolute; margin-top: -18rem; min-height: 40px"
      >
        <form *ngIf="!loggedIn">
          <input
            style="color: white"
            class="form-inline my-2 my-lg-0 form-control mr-sm-2 white-placeholder"
            type="text"
            placeholder="username"
            aria-label="text"
            [(ngModel)]="username"
            [ngModelOptions]="{ standalone: true }"
            maxlength="12"
          />
          <input
            style="color: white"
            class="form-control mr-sm-2 white-placeholder"
            type="text"
            placeholder="password"
            aria-label="text"
            [(ngModel)]="password"
            [ngModelOptions]="{ standalone: true }"
            maxlength="12"
          />
          <app-front-end-authentication
            [userName]="username"
            [password]="password"
          ></app-front-end-authentication>
        </form>
      </div>
    </span>
  </div>
  <router-outlet></router-outlet>
</div>
